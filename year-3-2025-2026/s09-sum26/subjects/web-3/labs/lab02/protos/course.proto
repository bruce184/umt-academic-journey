syntax = "proto3";

package course;

service CourseService {
  rpc GetCourse(GetCourseRequest) returns (CourseResponse);
  rpc CreateCourse(CreateCourseRequest) returns (CourseResponse);
  rpc ListCourses(ListCoursesRequest) returns (ListCoursesResponse);
  rpc BatchGetCourses(BatchGetCoursesRequest) returns (BatchGetCoursesResponse);
}

message Course {
  string id = 1;
  string title = 2;
  string description = 3;
  int32 credits = 4;
}

message GetCourseRequest {
  string id = 1;
}

message CourseResponse {
  Course course = 1;
}

message CreateCourseRequest {
  string title = 1;
  string description = 2;
  int32 credits = 3;
}

message PageInfo {
  int32 total = 1;
  int32 limit = 2;
  int32 offset = 3;
  bool has_next_page = 4;
  bool has_previous_page = 5;
}

message ListCoursesRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message ListCoursesResponse {
  repeated Course courses = 1;
  PageInfo page_info = 2;
}

message BatchGetCoursesRequest {
  repeated string ids = 1;
}

message BatchGetCoursesResponse {
  repeated Course courses = 1;
}
