syntax = "proto3";

package enrollment;

service EnrollmentService {
  rpc GetEnrollment(GetEnrollmentRequest) returns (EnrollmentResponse);
  rpc CreateEnrollment(CreateEnrollmentRequest) returns (EnrollmentResponse);
  rpc ListEnrollments(ListEnrollmentsRequest) returns (ListEnrollmentsResponse);
  rpc ListEnrollmentsByStudent(ListEnrollmentsByStudentRequest) returns (ListEnrollmentsResponse);
  rpc ListEnrollmentsByCourse(ListEnrollmentsByCourseRequest) returns (ListEnrollmentsResponse);
}

message Enrollment {
  string id = 1;
  string student_id = 2;
  string course_id = 3;
  string status = 4;
}

message GetEnrollmentRequest {
  string id = 1;
}

message EnrollmentResponse {
  Enrollment enrollment = 1;
}

message CreateEnrollmentRequest {
  string student_id = 1;
  string course_id = 2;
}

message PageInfo {
  int32 total = 1;
  int32 limit = 2;
  int32 offset = 3;
  bool has_next_page = 4;
  bool has_previous_page = 5;
}

message ListEnrollmentsRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message ListEnrollmentsByStudentRequest {
  string student_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message ListEnrollmentsByCourseRequest {
  string course_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message ListEnrollmentsResponse {
  repeated Enrollment enrollments = 1;
  PageInfo page_info = 2;
}
