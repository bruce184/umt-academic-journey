services:
  db:
    image: postgres:15-alpine
    container_name: lab8_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: lab8_db
    ports:
      - "5432:5432"
    volumes:
      - lab8_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d lab8_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    container_name: lab8_api
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    ports:
      - "3443:3443"

volumes:
  lab8_db_data:
