services:
  db:
    image: postgres:15-alpine
    container_name: course_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local-only}
      POSTGRES_DB: course_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d course_db"]
      interval: 5s
      timeout: 30s
      retries: 5
    volumes:
      - db_data:/var/lib/postgresql/data
  graphql_api:
    build: .
    container_name: course_api
    ports:
      - "${PORT:-4000}:4000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
volumes:
  db_data: