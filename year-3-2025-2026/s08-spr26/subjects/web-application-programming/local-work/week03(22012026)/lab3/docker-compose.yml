services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: suser
      POSTGRES_PASSWORD: "123456"
      POSTGRES_DB: mydb
    ports:
      - "54232:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U suser -d mydb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
